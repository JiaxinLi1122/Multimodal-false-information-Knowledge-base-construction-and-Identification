<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Multi-False Detector</title>
  <style>
    body {
      width: 320px;
      padding: 16px;
      font-family: sans-serif;
      font-size: 14px;
      color: #1a1a1a;
    }

    h1 {
      font-size: 16px;
      margin: 0 0 12px;
      color: #2c2c2c;
    }

    button {
      width: 100%;
      padding: 8px 0;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover { background: #4338ca; }
    button:disabled { background: #9ca3af; cursor: not-allowed; }

    #result {
      margin-top: 14px;
      padding: 12px;
      border-radius: 8px;
      background: #f3f4f6;
      font-size: 13px;
      color: #374151;
      transition: background 0.25s ease;
    }

    /* ── Loading state ───────────────────────────── */

    #loading-output {
      display: none;
    }

    .loading-header {
      font-size: 15px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 10px;
    }

    .step-list {
      list-style: none;
      padding: 0;
      margin: 0;
      font-size: 12px;
    }

    .step-list li {
      position: relative;
      padding: 3px 0 3px 22px;
      color: #d1d5db;
      transition: color 0.2s;
    }

    .step-list li::before {
      content: "○";
      position: absolute;
      left: 0;
      font-size: 11px;
      line-height: 20px;
      color: #d1d5db;
      transition: color 0.2s;
    }

    .step-list li.active {
      color: #374151;
      font-weight: 500;
    }

    .step-list li.active::before {
      content: "●";
      color: #4f46e5;
      animation: pulse 0.9s ease-in-out infinite;
    }

    .step-list li.done {
      color: #9ca3af;
    }

    .step-list li.done::before {
      content: "✓";
      color: #16a34a;
      animation: none;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.35; }
    }

    /* ── Result state ────────────────────────────── */

    #risk-badge {
      font-size: 22px;
      font-weight: 800;
      text-align: center;
      letter-spacing: 0.05em;
      padding: 6px 0 2px;
    }

    #risk-badge.HIGH    { color: #b91c1c; }
    #risk-badge.MEDIUM  { color: #92400e; }
    #risk-badge.LOW     { color: #166534; }

    #confidence-line {
      text-align: center;
      font-size: 12px;
      color: #6b7280;
      margin-bottom: 10px;
    }

    .divider {
      border: none;
      border-top: 1px solid rgba(0,0,0,0.1);
      margin: 8px 0;
    }

    #explanations-list {
      margin: 6px 0 8px;
      padding-left: 18px;
      line-height: 1.55;
    }

    #explanations-list li { margin-bottom: 4px; }

    #meta-line {
      font-size: 11px;
      color: #9ca3af;
      margin-top: 6px;
    }

    #analysis-output { display: none; }

    /* ── Background colours per risk level ───────── */

    #result.HIGH    { background: #fee2e2; }
    #result.MEDIUM  { background: #fef9c3; }
    #result.LOW     { background: #dcfce7; }
  </style>
</head>
<body>
  <h1>Multi-False Detector</h1>

  <button id="analyseBtn">Analyse Current Page</button>

  <div id="result">

    <!-- 1. Idle / error state -->
    <span id="status-text">Press the button to analyse this page.</span>

    <!-- 2. Loading state -->
    <div id="loading-output">
      <div class="loading-header">Analyzing…</div>
      <ul class="step-list">
        <li id="step-1">Extracting page text</li>
        <li id="step-2">Capturing screenshot</li>
        <li id="step-3">Running model</li>
      </ul>
    </div>

    <!-- 3. Result state -->
    <div id="analysis-output">
      <div id="risk-badge"></div>
      <div id="confidence-line"></div>
      <hr class="divider" />
      <ul id="explanations-list"></ul>
      <div id="meta-line"></div>
    </div>

  </div>

  <script src="popup.js"></script>
</body>
</html>
